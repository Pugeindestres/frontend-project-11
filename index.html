<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Aggregator</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <h1 class="text-center mb-4">RSS Aggregator</h1>
        
        <form id="rss-form">
          <div class="mb-3">
            <label for="url-input" class="form-label">RSS URL</label>
            <input 
              type="url" 
              class="form-control" 
              id="url-input" 
              placeholder="https://example.com/rss.xml"
              required
            >
            <div class="invalid-feedback">
              Please enter a valid URL
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">Add RSS</button>
        </form>
        
        <div id="feeds" class="mt-4"></div>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
